<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="内容管理 - 个人简历网站">
  <title>内容管理 · 简历后台</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* --- 管理后台专用样式 --- */
    .admin-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: var(--space-8);
      align-items: start;
    }

    .admin-sidebar {
      position: sticky;
      top: calc(var(--nav-height) + var(--space-6));
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
    }

    .admin-sidebar a {
      display: block;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-secondary);
      text-decoration: none;
      transition: all var(--transition-fast);
    }

    .admin-sidebar a:hover,
    .admin-sidebar a.active {
      color: var(--color-primary);
      background-color: var(--color-primary-light);
    }

    .admin-sidebar-title {
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      padding: var(--space-2) var(--space-3);
      margin-top: var(--space-2);
    }

    .admin-sidebar-title:first-child {
      margin-top: 0;
    }

    .admin-section {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      margin-bottom: var(--space-6);
      scroll-margin-top: calc(var(--nav-height) + var(--space-6));
    }

    .admin-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-6);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--color-border-light);
    }

    .admin-section-header h2 {
      font-size: var(--text-xl);
      margin: 0;
    }

    .admin-section-header h2 i {
      color: var(--color-primary);
      margin-right: var(--space-2);
    }

    .admin-field {
      margin-bottom: var(--space-5);
    }

    .admin-field:last-child {
      margin-bottom: 0;
    }

    .admin-field label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 600;
      margin-bottom: var(--space-2);
      color: var(--color-text);
    }

    .admin-field .field-key {
      font-size: var(--text-xs);
      font-weight: 400;
      color: var(--color-text-muted);
      font-family: var(--font-mono);
      margin-left: var(--space-2);
    }

    .admin-field .field-desc {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-1);
    }

    .admin-field input[type="text"],
    .admin-field textarea {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      font-family: inherit;
      background-color: var(--color-bg);
      color: var(--color-text);
      transition: border-color var(--transition-fast);
      outline: none;
    }

    .admin-field input[type="text"]:focus,
    .admin-field textarea:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-light);
    }

    .admin-field textarea {
      min-height: 80px;
      resize: vertical;
    }

    .admin-field input[type="text"] {
      max-width: 500px;
    }

    .admin-actions {
      position: sticky;
      bottom: var(--space-6);
      display: flex;
      justify-content: center;
      gap: var(--space-4);
      padding: var(--space-4);
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      z-index: 10;
    }

    .admin-actions .btn {
      min-width: 140px;
    }

    /* 头像管理 */
    .admin-avatar-section {
      display: flex;
      align-items: center;
      gap: var(--space-6);
      padding: var(--space-4);
      background: var(--color-bg-alt);
      border-radius: var(--radius-md);
    }

    .admin-avatar-preview {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: var(--color-primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-3xl);
      color: var(--color-primary);
      overflow: hidden;
      flex-shrink: 0;
      border: 3px solid var(--color-primary);
    }

    .admin-avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .admin-toast {
      position: fixed;
      bottom: var(--space-24);
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--color-text);
      color: var(--color-bg);
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      box-shadow: var(--shadow-lg);
    }

    .admin-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .admin-toast.error {
      background: var(--color-error);
      color: #fff;
    }

    @media (max-width: 767px) {
      .admin-layout {
        grid-template-columns: 1fr;
      }
      .admin-sidebar {
        display: none;
      }
      .admin-actions {
        flex-direction: column;
        align-items: stretch;
      }
      .admin-actions .btn {
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">[名字]</a>
      <nav class="navbar-menu">
        <a href="index.html" class="navbar-link" data-i18n="nav.home">首页</a>
        <a href="resume.html" class="navbar-link" data-i18n="nav.resume">简历</a>
        <a href="projects.html" class="navbar-link" data-i18n="nav.projects">项目</a>
        <a href="contact.html" class="navbar-link" data-i18n="nav.contact">联系</a>
      </nav>
      <div class="navbar-actions">
        <button class="lang-btn" aria-label="Switch language">EN</button>
        <button class="theme-toggle" aria-label="Toggle dark mode">
          <i class="fas fa-moon"></i>
        </button>
        <button class="hamburger" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="main-content">
    <section class="page-header">
      <div class="container">
        <h1><i class="fas fa-cog"></i> 内容管理</h1>
        <p>在此修改网站所有文本内容，修改后自动保存至浏览器</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="admin-layout">
          <!-- 侧边导航 -->
          <aside class="admin-sidebar" id="adminSidebar">
            <div class="admin-sidebar-title">页面管理</div>
            <a href="#sec-nav">导航</a>
            <a href="#sec-hero">首页 Hero</a>
            <a href="#sec-skills">技能</a>
            <a href="#sec-resume">简历标题</a>
            <a href="#sec-experience">工作经历</a>
            <a href="#sec-education">教育背景</a>
            <a href="#sec-skillcats">专业技能分类</a>
            <a href="#sec-projects">项目作品</a>
            <a href="#sec-contact">联系信息</a>
            <a href="#sec-footer">页脚</a>
            <a href="#sec-avatar">头像</a>
            <div class="admin-sidebar-title" style="margin-top: var(--space-4); border-top: 1px solid var(--color-border); padding-top: var(--space-3);">操作</div>
            <a href="index.html" target="_blank"><i class="fas fa-external-link-alt"></i> 预览首页</a>
            <a href="resume.html" target="_blank"><i class="fas fa-external-link-alt"></i> 预览简历</a>
          </aside>

          <!-- 内容表单 -->
          <div class="admin-form" id="adminForm">
            <!-- 由 JS 动态渲染 -->
            <p style="text-align:center; color: var(--color-text-muted); padding: var(--space-12) 0;">
              <i class="fas fa-spinner fa-spin"></i> 加载中...
            </p>
          </div>
        </div>

        <!-- 底部操作栏 -->
        <div class="admin-actions">
          <button class="btn btn-primary btn-lg" id="adminSaveAll">
            <i class="fas fa-save"></i> 保存全部修改
          </button>
          <button class="btn btn-outline btn-lg" id="adminResetAll">
            <i class="fas fa-undo"></i> 恢复默认
          </button>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast -->
  <div class="admin-toast" id="adminToast"></div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-social">
        <a href="#" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="fab fa-github"></i></a>

      </div>
      <p data-i18n="footer.copyright">© 2026 [你的名字] · 保留所有权利</p>
    </div>
  </footer>

  <script src="data/content.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
